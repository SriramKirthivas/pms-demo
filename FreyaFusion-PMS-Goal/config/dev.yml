# pm-goal — dev profile. Loaded when APP_ENV=dev (the analogue of
# SPRING_PROFILES_ACTIVE). Non-secret config lives here; secret VALUES are
# fetched from AWS Secrets Manager by the NAMES below (enable-aws-secrets) —
# nothing sensitive is set as an env var or committed.
#
# NOTE: PORT is read by the container start command before the app boots, so it
# stays a Dockerfile default (8081 for pm-goal), not a value here.

INTERNAL_ENFORCE: "1"        # require the internal token on /system/* (prod)
INTERNAL_TIMEOUT: "5"        # httpx timeout (seconds) for cross-service calls
AWS_REGION: "us-east-1"

# --- AWS Secrets Manager (values fetched at startup) ---
ENABLE_AWS_SECRETS: "true"
# RDS-format DB secret {username, password, host, port[, dbname]} -> DATABASE_URL.
DB_SECRET_NAME: "ff-pms-devsecops-db-secrets"
# App secret {SECRET_KEY, INTERNAL_TOKEN}.
APP_SECRET_NAME: "ff-pms-devsecops-common-secrets"

# --- Internal service-to-service base URLs (dev internal ALB) ---
GOAL_URL: "http://pm-goal:8081"
EVAL_URL: "http://pm-eval:8082"
SCORE_URL: "http://pm-score:8083"
NOTIFY_URL: "http://pm-notify:8084"
